<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auticiel IA</title>
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #fff;
      color: #2f3941;
      font-size: 13px;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e9ebed;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #0066cc;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      color: #1f3141;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: #68737d;
      line-height: 1.3;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 14px;
      background: #1f73b7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) { background: #1a5f9a; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      background: #fff;
      color: #2f3941;
      border: 1px solid #d8dcde;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-secondary:hover { background: #f3f4f6; }

    #loading {
      display: none;
      align-items: center;
      gap: 8px;
      color: #68737d;
      font-size: 12px;
      margin-top: 12px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #e9ebed;
      border-top-color: #1f73b7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #reply-section {
      display: none;
      margin-top: 14px;
    }

    .reply-label {
      font-size: 11px;
      font-weight: 600;
      color: #68737d;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    #reply-text {
      background: #f8f9f9;
      border: 1px solid #e9ebed;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.7;
      color: #2f3941;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
    }

    #error-msg {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      background: #fff0f1;
      border: 1px solid #f5b8bb;
      border-radius: 6px;
      font-size: 12px;
      color: #cc3340;
    }

    #confirmation {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      background: #edf8ed;
      border: 1px solid #a8d9a8;
      border-radius: 6px;
      font-size: 12px;
      color: #287d3c;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">A</div>
    <div class="header-text">
      <h1>Auticiel IA</h1>
      <p>Génération de réponse</p>
    </div>
  </div>

  <button class="btn-primary" id="btn-generate">
    ✨ Générer une réponse
  </button>

  <div id="loading">
    <span class="spinner"></span>
    Génération en cours…
  </div>

  <div id="error-msg"></div>

  <div id="reply-section">
    <div class="reply-label">Réponse suggérée</div>
    <div id="reply-text"></div>
    <button class="btn-secondary" id="btn-use">📋 Utiliser cette réponse</button>
  </div>

  <div id="confirmation">✅ Réponse insérée dans l'éditeur !</div>

  <script>
    const client = ZAFClient.init()
    client.invoke('resize', { width: '100%', height: '500px' })

    const btnGenerate = document.getElementById('btn-generate')
    const btnUse = document.getElementById('btn-use')
    const loading = document.getElementById('loading')
    const replySection = document.getElementById('reply-section')
    const replyText = document.getElementById('reply-text')
    const confirmation = document.getElementById('confirmation')
    const errorMsg = document.getElementById('error-msg')

    let generatedReply = ''

    btnGenerate.addEventListener('click', async () => {
      btnGenerate.disabled = true
      loading.style.display = 'flex'
      replySection.style.display = 'none'
      confirmation.style.display = 'none'
      errorMsg.style.display = 'none'
      generatedReply = ''

      try {
        const data = await client.get(['ticket.subject', 'ticket.description'])
        const subject = data['ticket.subject'] || ''
        const description = data['ticket.description'] || ''

        const res = await fetch('https://auticiel-ia.vercel.app/api/generate-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject, description }),
        })

        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.error || `Erreur ${res.status}`)
        }

        const json = await res.json()
        generatedReply = json.reply || ''

        replyText.textContent = generatedReply
        replySection.style.display = 'block'
        client.invoke('resize', { width: '100%', height: '650px' })

      } catch (err) {
        errorMsg.textContent = '❌ ' + (err.message || 'Erreur inconnue')
        errorMsg.style.display = 'block'
      } finally {
        loading.style.display = 'none'
        btnGenerate.disabled = false
      }
    })

    btnUse.addEventListener('click', async () => {
      if (!generatedReply) return

      // Assurer des double sauts de ligne entre chaque paragraphe
      const formatted = generatedReply
        .split(/\n{2,}/)
        .map(p => p.trim())
        .filter(Boolean)
        .join('\n\n')

      await client.set('ticket.comment.text', formatted)

      replySection.style.display = 'none'
      confirmation.style.display = 'block'
    })
  </script>

</body>
</html>
